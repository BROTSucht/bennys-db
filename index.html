<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Benny's Luxury Customs - Full Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bennys-yellow: #ffcc00; --bennys-dark: #111; --bennys-grey: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bennys-dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: var(--bennys-grey); padding: 25px; border-radius: 15px; border: 1px solid #444; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--bennys-yellow); }
        .tab-btn { background: none; border: none; color: #888; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { color: var(--bennys-yellow); border-bottom: 4px solid var(--bennys-yellow); }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #000; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; }
        
        button.action-btn { background: var(--bennys-yellow); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; grid-column: 1 / -1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--bennys-yellow); padding: 12px; border-bottom: 2px solid #333; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #333; }

        .pickup-card { background: #000; border-left: 5px solid var(--bennys-yellow); padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .pickup-time { color: var(--bennys-yellow); font-weight: bold; font-size: 1.2rem; }
        
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .tag-gold { background: #ffd700; color: #000; }
        .hidden { display: none; }
        .invoice-preview { background: #eee; color: #000; padding: 20px; font-family: monospace; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Benny's Original Motorworks</h1>

    <div class="tabs">
        <button id="t-ws" class="tab-btn active" onclick="showTab('workshop')">🛠️ Werkstatt</button>
        <button id="t-pu" class="tab-btn" onclick="showTab('pickup')">📋 Abholungen</button>
        <button id="t-db" class="tab-btn" onclick="showTab('database')">📂 Archiv</button>
        <button id="t-iv" class="tab-btn" onclick="showTab('invoice')">🧾 Rechnung</button>
    </div>

    <div id="workshopSection">
        <div class="input-grid">
            <div class="input-group"><label>Kennzeichen</label><input type="text" id="p_plate"></div>
            <div class="input-group"><label>Modell</label><input type="text" id="p_model"></div>
            <div class="input-group"><label>Kundenname</label><input type="text" id="p_owner"></div>
            <div class="input-group"><label>Mechaniker</label><input type="text" id="p_mechanic"></div>
            <div class="input-group"><label>Arbeit</label><input type="text" id="p_repairs"></div>
            <div class="input-group"><label>Kosten $</label><input type="number" id="p_cost"></div>
            <div class="input-group">
                <label>Abholbereit am/um</label>
                <input type="text" id="p_pickup" placeholder="z.B. Heute 20:00 Uhr">
            </div>
            <div class="input-group">
                <label>Mitglied</label>
                <select id="p_member">
                    <option value="Keine">Keine</option>
                    <option value="Bronze">Bronze (5%)</option>
                    <option value="Silber">Silber (10%)</option>
                    <option value="Gold">Gold (15%)</option>
                </select>
            </div>
            <button class="action-btn" onclick="submitRepair()">Auftrag speichern</button>
        </div>
    </div>

    <div id="pickupSection" class="hidden">
        <h3>Fahrzeuge in Bearbeitung / Wartend</h3>
        <div id="pickupList"></div>
    </div>

    <div id="databaseSection" class="hidden">
        <table>
            <thead>
                <tr><th>Datum</th><th>KFZ</th><th>Kunde</th><th>Arbeit</th><th>Preis</th><th>Besuche</th></tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>

    <div id="invoiceSection" class="hidden">
        <div class="invoice-preview">
            <pre id="invoiceText"></pre>
            <button onclick="copyInvoice()">Kopieren</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://lfeppmyecdjjvnscfdug.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZXBwbXllY2RqanZuc2NmZHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjAwNzksImV4cCI6MjA5NDAzNjA3OX0.SCJL7C9CkhLAhYWAS-dPP6c_ApSmBXvlHoxuBzKxNBU";
    const _supabase = window.supabase.createClient(SB_URL, SB_KEY);
    let dataCache = [];

    async function load() {
        const { data } = await _supabase.from('Cars').select('*').order('last_repair_date', { ascending: false });
        dataCache = data || [];
        renderAll();
    }

    function showTab(t) {
        ['workshop','pickup','database','invoice'].forEach(s => document.getElementById(s+'Section').classList.add('hidden'));
        document.getElementById(t+'Section').classList.remove('hidden');
        ['t-ws','t-pu','t-db','t-iv'].forEach(b => document.getElementById(b).classList.remove('active'));
        document.getElementById('t-'+t.substring(0,2)).classList.add('active');
    }

    async function submitRepair() {
        const plate = document.getElementById('p_plate').value.toUpperCase();
        const pickup = document.getElementById('p_pickup').value || "Sofort";
        const cost = parseFloat(document.getElementById('p_cost').value);
        const old = dataCache.find(c => c.plate === plate);

        const { error } = await _supabase.from('Cars').upsert({
            plate, 
            model: document.getElementById('p_model').value,
            owner: document.getElementById('p_owner').value,
            mechanic: document.getElementById('p_mechanic').value,
            repairs_done: document.getElementById('p_repairs').value,
            cost: cost + "$",
            has_membership: document.getElementById('p_member').value,
            pickup_time: pickup,
            last_repair_date: new Date().toLocaleString('de-DE'),
            visits: old ? (old.visits + 1) : 1
        }, { onConflict: 'plate' });

        if(!error) {
            createInvoice(plate, cost);
            load();
            showTab('pickup');
        }
    }

    function renderAll() {
        // Abhol-Liste
        const puList = document.getElementById('pickupList');
        puList.innerHTML = '';
        dataCache.forEach(c => {
            if(c.pickup_time && c.pickup_time !== "Abgeholt") {
                puList.innerHTML += `
                    <div class="pickup-card">
                        <div>
                            <strong>${c.plate}</strong> (${c.model})<br>
                            <small>Besitzer: ${c.owner} | Mechaniker: ${c.mechanic}</small>
                        </div>
                        <div style="text-align:right">
                            <div class="pickup-time">${c.pickup_time}</div>
                            <button onclick="markAsPickedUp('${c.plate}')" style="margin-top:5px; font-size:0.7rem; cursor:pointer;">Als abgeholt markieren</button>
                        </div>
                    </div>`;
            }
        });

        // Archiv-Tabelle
        const b = document.getElementById('mainTable');
        b.innerHTML = '';
        dataCache.forEach(c => {
            b.innerHTML += `<tr>
                <td><small>${c.last_repair_date}</small></td>
                <td><b>${c.plate}</b></td>
                <td>${c.owner}</td>
                <td>${c.repairs_done}</td>
                <td>${c.cost}</td>
                <td>${c.visits}x</td>
            </tr>`;
        });
    }

    async function markAsPickedUp(plate) {
        await _supabase.from('Cars').update({ pickup_time: 'Abgeholt' }).eq('plate', plate);
        load();
    }

    function createInvoice(plate, cost) {
        const mType = document.getElementById('p_member').value;
        let disc = 0;
        if(mType==="Bronze") disc=0.05; if(mType==="Silber") disc=0.1; if(mType==="Gold") disc=0.15;
        const total = (cost * (1 - disc)).toFixed(2);
        document.getElementById('invoiceText').innerText = `BENNY'S INVOICE\nKFZ: ${plate}\n------------------\nNETTO: ${cost}$\nRABATT: ${mType}\n------------------\nTOTAL: ${total}$`;
    }

    function copyInvoice() {
        navigator.clipboard.writeText(document.getElementById('invoiceText').innerText);
        alert("Kopiert!");
    }

    setInterval(load, 20000);
    load();
</script>
</body>
</html>
